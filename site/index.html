<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OldPhilly</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="title-card">
      <div id="title-row">
        <h1>OldPhilly</h1>
        <button id="title-toggle" aria-label="Collapse panel">▾</button>
      </div>
      <div id="title-body">
        <p class="subtitle">
          Historical photographs from the Philadelphia City Archives
        </p>
        <input
          id="photo-search"
          type="text"
          placeholder="Search photos (press Enter)…"
          autocomplete="off"
        />
        <input
          id="address-search"
          type="text"
          placeholder="Search address…"
          autocomplete="off"
        />
        <input
          id="year-filter"
          type="text"
          placeholder="Filter by year (e.g. 1900 or 1850-1907)"
          autocomplete="off"
        />
        <div class="card-footer">
          <a href="about.html">About</a>
          <button id="random-btn">🎲 Random</button>
        </div>
      </div>
    </div>

    <div id="sidebar" class="hidden">
      <button id="close-btn" aria-label="Close">&times;</button>
      <div id="sidebar-content">
        <div id="loading">Loading&hellip;</div>
      </div>
    </div>

    <div id="modal" class="hidden" role="dialog" aria-modal="true">
      <div id="modal-backdrop"></div>
      <button id="modal-close" aria-label="Close">&times;</button>
      <button id="modal-prev" class="modal-nav" aria-label="Previous photo">
        &#8249;
      </button>
      <button id="modal-next" class="modal-nav" aria-label="Next photo">
        &#8250;
      </button>
      <div id="modal-img-wrap">
        <img id="modal-img" src="" alt="" />
      </div>
      <div id="modal-caption"></div>
    </div>

    <div id="zoom-hint">Zoom in to explore photos</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="app.js"></script>
  </body>
</html>
