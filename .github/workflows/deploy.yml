name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: uv sync

      - name: Download source_records parquet from Hugging Face
        run: |
          curl -fsSL --retry 3 --retry-delay 5 --max-time 120 \
            "https://huggingface.co/datasets/h0rv/phillyhistory-metadata/resolve/main/source_records.parquet" \
            -o /tmp/source_records.parquet
          echo "Downloaded $(du -sh /tmp/source_records.parquet | cut -f1)"

      - name: Generate site data
        run: uv run python scripts/generate_site_data.py --from-hf /tmp/source_records.parquet

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=oldphilly --branch=deploy --commit-dirty=true
